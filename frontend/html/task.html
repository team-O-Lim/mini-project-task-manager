<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resizable Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Segoe UI", sans-serif; }

    .container {
      display: flex;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .sidebar {
      width: 220px;
      background: #d3c0a6;
      padding: 20px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f9f5f0;
    }

    .header {
      height: 60px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #ddd;
      background: #f0ebe6;
      font-weight: bold;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    /* 숨겨진 체크박스 */
    #toggle-panel { display: none; }

    /* 오른쪽 상세 패널 */
    .detail-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 0;
      height: 100%;
      background: #fff;
      overflow: hidden;
      border-left: 1px solid #ddd;
      transition: width 0.3s ease;
    }

    /* 열렸을 때 */
    #toggle-panel:checked ~ .detail-panel {
      width: 50%;
      resize: horizontal;  /* 가로 크기 조절 가능 */
      overflow: auto;
      min-width: 300px;
      max-width: 100%;
    }

    .panel-header {
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      border-bottom: 1px solid #eee;
      background: #fafafa;
    }

    .panel-body { padding: 15px; }

    .button {
      cursor: pointer;
      display: inline-block;
      background: #d3c0a6;
      color: #fff;
      padding: 6px 12px;
      border-radius: 5px;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <h3>Sidebar</h3>
      <p><label for="toggle-panel" class="button">Task 열기</label></p>
    </aside>

    <main class="main">
      <div class="header">Task Manager</div>
      <div class="content">
        <p>여기에 Task 리스트 표시</p>
        <p><label for="toggle-panel" class="button">👉 Task 1 상세 열기</label></p>
      </div>
    </main>

    <!-- 체크박스로 패널 제어 -->
    <input type="checkbox" id="toggle-panel">

    <div class="detail-panel">
      <div class="panel-header">
        <span>Task 상세</span>
        <label for="toggle-panel" class="button">닫기 ✖</label>
      </div>
      <div class="panel-body">
        <p>Task 상세 내용...</p>
        <p>이 패널은 오른쪽 라인을 잡고 마우스로 늘리거나 줄일 수 있습니다.</p>
      </div>
    </div>
  </div>
</body>
</html>
