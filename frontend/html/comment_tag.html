<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>comment_tag.html</title>
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/commet_tag.css">
</head>

<body>
  <div class="container">
    <div class="main">

      <!-- 태그 -->
      <div class="tag">
        <div>
          <h2>Tag</h2>
        </div>
        <div class="tag-message">
          <p><span style="color: [color];">[#name]</span></p>
        </div>
      </div>

      <div class="comment-header">
        <!-- 코멘트 -->
        <div>
          <h2>Comment</h2>
        </div>
      </div>

      <div class="comment-inner">
        <div class="comment item1">
          <p>[name]</p>
        </div>
        <div class="comment-item2">
          <input class="comment-text" type="text" placeholder="코멘트 내용을 입력해주세요.">
        </div>
        <div class="comment-item3">
          <button class="comment-button">확인</button>
        </div>
      </div>

      <div class="comment-out">
        <div class="comment-view">
          [name]
        </div>
        <div class="comment-view">
          [comment]
        </div>
        <div class="comment-view">
          [createdAt]
        </div>
      </div>

    </div>
  </div>
</body>
</html>
